<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dice.css">
    <script src="dice.js" defer></script>
</head>
<body>
    <h1>Dice Roller</h1>
    <div id="selectDice">
        <p># of dice: </p>
        <input type="number" id="numOfDice" value="1" min="1">
        <button id="rollDice">Roll Dice</button>
    </div>
    <p id="Values">dice: </p>
    <div id="diceFaces">
        <img src="diceFaces/dice1.png" class="face" id="face1">
        <img src="diceFaces/dice2.png" class="face" id="face2">
        <img src="diceFaces/dice3.png" class="face" id="face3">
        <img src="diceFaces/dice4.png" class="face" id="face4">
        <img src="diceFaces/dice5.png" class="face" id="face5">
        <img src="diceFaces/dice6.png" class="face" id="face6">
    </div>
</body>
</html>
