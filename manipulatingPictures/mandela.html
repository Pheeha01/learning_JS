<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mandela.css">
    <script src="mandela.js" defer></script>
</head>
<body>
    <h1>
    Freedom Fighter Pics!
    </h1>
    <div id="pics">
        <img class="mandela" src="mandela1.jpg" alt="Mandela" />
        <img class="mandela" src="mandela2.jpg" alt="Mandela" />
        <img class="mandela" src="mandela3.jpg" alt="Mandela" />
        <img class="mandela" src="mandela5.jpg" alt="Mandela" />
        <img class="mandela" src="mandela6.jpg" alt="Mandela" />
    </div>
    <p>Click a picture to move it to the Favorites.</p>
    <fieldset id="favorites" class="mandela">
        <legend>Favorite photos: </legend>
    </fieldset>
    <ul id="actions"></ul>
    <label for="">Click a picture to remove from favourites</label>
</body>
</html>
